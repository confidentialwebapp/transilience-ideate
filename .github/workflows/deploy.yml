name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# One deploy per branch at a time; cancel a superseded run rather than race it.
concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Gate the whole deploy on the token being configured, so the check passes
      # (instead of failing) until VERCEL_TOKEN is added as a repo secret.
      - name: Check for Vercel token
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not configured — skipping deploy. Add the secret to enable auto-deploy."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        if: steps.guard.outputs.run == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        if: steps.guard.outputs.run == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.guard.outputs.run == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        if: steps.guard.outputs.run == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
